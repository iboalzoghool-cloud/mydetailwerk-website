  box-shadow: inset 0 1px 0 rgba(255,255,255,0.22), 0 30px 80px -20px rgba(0,0,0,0.9);
}
.surf-fabric {
  background:
    repeating-linear-gradient(0deg, rgba(200,175,140,0.045) 0px, rgba(200,175,140,0.045) 1px, transparent 1px, transparent 5px),
    repeating-linear-gradient(90deg, rgba(160,130,95,0.04) 0px, rgba(160,130,95,0.04) 1px, transparent 1px, transparent 5px),
    repeating-linear-gradient(45deg, rgba(180,150,110,0.025) 0px, rgba(180,150,110,0.025) 1px, transparent 1px, transparent 7px),
    radial-gradient(120% 80% at 20% 0%, rgba(180,150,110,0.28), transparent 58%),
    linear-gradient(160deg, #1c1814 0%, #110d09 100%);
  border: 1px solid rgba(180,150,110,0.16);
}
.surf-plastic {
  background:
    repeating-linear-gradient(90deg, rgba(210,215,225,0.04) 0px, rgba(210,215,225,0.04) 1px, transparent 1px, transparent 3px),
    radial-gradient(120% 80% at 70% 0%, rgba(180,185,200,0.2), transparent 55%),
    radial-gradient(70% 55% at 0% 100%, rgba(50,70,110,0.14), transparent 60%),
    linear-gradient(160deg, #16171c 0%, #0c0d12 100%);
  border: 1px solid rgba(192,197,203,0.14);
}

/* Process node */
.proc-node {
  width: 64px; height: 64px;
  border-radius: 50%;
  background: radial-gradient(circle, #1a1a1d 0%, #0a0a0b 70%);
  border: 1px solid rgba(192,197,203,0.3);
  display: flex; align-items: center; justify-content: center;
  position: relative;
  box-shadow: 0 0 28px rgba(192,197,203,0.08), inset 0 0 14px rgba(0,0,0,0.6);
}
.proc-node::before {
  content: '';
  position: absolute; inset: -6px;
  border-radius: 50%;
  border: 1px solid rgba(192,197,203,0.08);
}

/* Region tag */
.region-tag {
  display: inline-flex;
  align-items: center; gap: 8px;
  padding: 10px 18px;
  border-radius: 999px;
  border: 1px solid rgba(255,255,255,0.1);
  background: rgba(255,255,255,0.02);
  font-size: 13px;
  transition: all .3s ease;
}
.region-tag:hover {
  border-color: rgba(201,169,106,0.4);
  background: rgba(201,169,106,0.05);
}
.region-tag .dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: #c9a96a; box-shadow: 0 0 6px #c9a96a;
}

/* FAQ */
.faq-item {
  border-bottom: 1px solid rgba(255,255,255,0.06);
}
.faq-item:first-child { border-top: 1px solid rgba(255,255,255,0.06); }

/* Footer accordions */
.legal-trigger {
  display: flex; justify-content: space-between; align-items: center;
  padding: 16px 0;
  cursor: pointer;
  font-size: 13px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  font-family: 'JetBrains Mono', monospace;
  color: #c0c5cb;
  transition: color .3s;
}
.legal-trigger:hover { color: #c9a96a; }

/* Hide tweaks panel when not active (host controls) */
.tweaks-hidden { display: none !important; }

/* Reduce motion */
@media (prefers-reduced-motion: reduce) {
  * { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
}

}

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    // Same-window signal so in-page listeners (deck-stage rail thumbnails)
    // can react — the parent message only reaches the host, not peers.
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', noDeckControls = false, children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  // Auto-inject a rail toggle when a <deck-stage> is on the page. The
  // toggle drives the deck's per-viewer _railVisible via window message;
  // state is mirrored from the same localStorage key the deck reads so
  // the control reflects reality across reloads. The mechanism is the
  // message — authors who want custom placement can post it directly
  // and pass noDeckControls to suppress this one.
  const hasDeckStage = React.useMemo(
    () => typeof document !== 'undefined' && !!document.querySelector('deck-stage'),
    [],
  );
  // Hide the toggle until the host has actually enabled the rail (the
  // __omelette_rail_enabled window message, posted only when the
  // omelette_deck_rail_enabled flag is on for this user). The initial read
  // covers TweaksPanel mounting after the message already arrived; the
  // listener covers the common case of mounting first.
  const [railEnabled, setRailEnabled] = React.useState(
    () => hasDeckStage && !!document.querySelector('deck-stage')?._railEnabled,
  );
  React.useEffect(() => {
    if (!hasDeckStage || railEnabled) return undefined;
    const onMsg = (e) => {
      if (e.data && e.data.type === '__omelette_rail_enabled') setRailEnabled(true);
    };
    window.addEventListener('message', onMsg);
    return () => window.removeEventListener('message', onMsg);
  }, [hasDeckStage, railEnabled]);
  const [railVisible, setRailVisible] = React.useState(() => {
    try { return localStorage.getItem('deck-stage.railVisible') !== '0'; } catch (e) { return true; }
  });
  const toggleRail = (on) => {
    setRailVisible(on);
    window.postMessage({ type: '__deck_rail_visible', on }, '*');
  };
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-noncommentable=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">
          {children}
          {hasDeckStage && railEnabled && !noDeckControls && (
            <TweakSection label="Deck">
              <TweakToggle label="Thumbnail rail" value={railVisible} onChange={toggleRail} />
            </TweakSection>
          )}
        </div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  // Segments wrap mid-word once per-segment width runs out. The track is
  // ~248px (280 panel − 28 body pad − 4 seg pad), each button loses 12px
  // to its own padding, and 11.5px system-ui averages ~6.3px/char — so 2
  // options fit ~16 chars each, 3 fit ~10. Past that (or >3 options), fall
  // back to a dropdown rather than wrap.
  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    // <select> emits strings — map back to the original option value so the
    // fallback stays type-preserving (numbers, booleans) like the segment path.
    const resolve = (s) => {
      const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s);
      return m === undefined ? s : typeof m === 'object' ? m.value : m;
    };
    return <TweakSelect label={label} value={value} options={options}
                        onChange={(s) => onChange(resolve(s))} />;
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };

    e.preventDefault();

    const decimals = (String(step).split('.')[1] || '').length;

      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };

      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

// Relative-luminance contrast pick — checkmarks drawn over a swatch need to
// read on both #111 and #fafafa without per-option configuration. Hex input
// only (#rgb / #rrggbb); named or rgb()/hsl() colors fall through to "light".
function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

const __TwkCheck = ({ light }) => (
  <svg viewBox="0 0 14 14" aria-hidden="true">
    <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2"
          strokeLinecap="round" strokeLinejoin="round"
          stroke={light ? 'rgba(0,0,0,.78)' : '#fff'} />
  </svg>
);

// TweakColor — curated color/palette picker. Each option is either a single
// hex string or an array of 1-5 hex strings; the card adapts — a lone color
// renders solid, a palette renders colors[0] as the hero (left ~2/3) with the
// rest stacked in a sharp column on the right. onChange emits the
// option in the shape it was passed (string stays string, array stays array).
// Without options it falls back to the native color input for back-compat.
function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" className="twk-swatch" value={value}
               onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  // Native <input type=color> emits lowercase hex per the HTML spec, so
  // compare case-insensitively. String() guards JSON.stringify(undefined),
  // which returns the primitive undefined (no .toLowerCase).
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio"
                    aria-checked={on} data-on={on ? '1' : '0'}
                    aria-label={colors.join(', ')} title={colors.join(' · ')}
                    style={{ background: hero }}
                    onClick={() => onChange(o)}>
              {sup.length > 0 && (
                <span>
                  {sup.map((c, j) => <i key={j} style={{ background: c }} />)}
                </span>
              )}
              {on && <__TwkCheck light={__twkIsLight(hero)} />}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

// ── LightTrailField (comet canvas) ───────────────────────────────────────────
function LightTrailField() {
  const canvasRef = useRef(null);
  useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    let rafId;
    const resize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; };
    resize();
    window.addEventListener('resize', resize);

    function makeComet(initial) {
      const speed = 3.2 + Math.random() * 4.8;
      const angle = -(0.10 + (Math.random() - 0.5) * 0.08);
      const trail = 100 + Math.random() * 220;
      const alpha = 0.18 + Math.random() * 0.20;
      const size  = 0.7 + Math.random() * 1.3;
      const isBlue = Math.random() > 0.35;
      let x, y;
      if (initial) { x = Math.random() * canvas.width; y = Math.random() * canvas.height; }
      else if (Math.random() < 0.65) { x = -trail - 30; y = 60 + Math.random() * (canvas.height - 80); }
      else { x = 20 + Math.random() * (canvas.width * 0.65); y = -trail - 30; }
      return { x, y, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed,
               trail, alpha, size, isBlue,
               delay: initial ? Math.floor(Math.random() * 150) : 80 + Math.floor(Math.random() * 400) };
    }

    const comets = Array.from({ length: 5 }, () => makeComet(true));

    function drawComet(c) {
      if (c.delay > 0) return;
      const norm = Math.hypot(c.vx, c.vy);
      const tx = c.x - (c.vx / norm) * c.trail;
      const ty = c.y - (c.vy / norm) * c.trail;
      const headR = c.isBlue ? `rgba(90,136,240,` : `rgba(230,235,244,`;
      const midR  = c.isBlue ? `rgba(58,110,232,` : `rgba(192,200,218,`;

      const g = ctx.createLinearGradient(tx, ty, c.x, c.y);
      g.addColorStop(0,    `rgba(0,0,0,0)`);
      g.addColorStop(0.55, `${midR}${c.alpha * 0.22})`);
      g.addColorStop(0.88, `${midR}${c.alpha * 0.65})`);
      g.addColorStop(1,    `${headR}${c.alpha})`);
      ctx.save();
      ctx.beginPath(); ctx.moveTo(tx, ty); ctx.lineTo(c.x, c.y);
      ctx.strokeStyle = g; ctx.lineWidth = c.size; ctx.lineCap = 'round'; ctx.stroke();

      const hg = ctx.createRadialGradient(c.x, c.y, 0, c.x, c.y, c.size * 8);
      hg.addColorStop(0,    `${headR}${Math.min(1, c.alpha * 2.2)})`);
      hg.addColorStop(0.3,  `${headR}${c.alpha * 0.85})`);
      hg.addColorStop(0.65, `${midR}${c.alpha * 0.28})`);
      hg.addColorStop(1,    `rgba(0,0,0,0)`);
      ctx.beginPath(); ctx.arc(c.x, c.y, c.size * 8, 0, Math.PI * 2);
      ctx.fillStyle = hg; ctx.fill();
      ctx.restore();
    }

    function frame() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      for (let i = 0; i < comets.length; i++) {
        const c = comets[i];
        if (c.delay > 0) { c.delay--; continue; }
        c.x += c.vx; c.y += c.vy;
        if (c.x > canvas.width + c.trail + 60 || c.y < -(c.trail + 60) || c.y > canvas.height + 100)
          comets[i] = makeComet(false);
        else drawComet(c);
      }
      rafId = requestAnimationFrame(frame);
    }
    rafId = requestAnimationFrame(frame);
    return () => { cancelAnimationFrame(rafId); window.removeEventListener('resize', resize); };
  }, []);
  return <canvas ref={canvasRef} style={{ position: 'absolute', inset: 0, width: '100%', height: '100%', pointerEvents: 'none', zIndex: 4 }} />;
}

// ── Reveal ───────────────────────────────────────────────────────────────────
function Reveal({ children, delay = 0, y = 28, className = '' }) {
  const ref = useRef(null);
  useEffect(() => {
    const el = ref.current; if (!el) return;
    const obs = new IntersectionObserver(([e]) => {
      if (e.isIntersecting) setTimeout(() => el.classList.add('in'), delay);
    }, { threshold: 0.12 });
    obs.observe(el);
    return () => obs.disconnect();
  }, [delay]);
  return <div ref={ref} className={`reveal ${className}`} style={{ transform: `translateY(${y}px)` }}>{children}</div>;
}

  { p: 0.25, text: 'Tür · Schweller',     x: '76%', y: '50%', side: 'right' },
  { p: 0.40, text: 'Einstieg · Fußraum',  x: '12%', y: '44%', side: 'left'  },
  { p: 0.55, text: 'Cockpit · Ablagen',   x: '74%', y: '38%', side: 'right' },
  { p: 0.68, text: 'Polster · Sitze',     x: '14%', y: '34%', side: 'left'  },
  { p: 0.80, text: 'Leder · Glas · Lack', x: '70%', y: '30%', side: 'right' },
];

function GlobalVideoBackdrop() {
  const videoRef    = useRef(null);
  const targetRef   = useRef(0);
  const lastSeekRef = useRef(0);
  const pRef        = useRef(0);
  const skyRef      = useRef(null);
  const stageRef    = useRef(null);
  const chipsRef    = useRef([]);

  const [blobUrl, setBlobUrl] = useState(null);
  const [ready,   setReady]   = useState(false);

  const CUT_END = 1.5;

  // ── 1. Blob fetch ──────────────────────────────────────────────────────────
  useEffect(() => {
    let url = null;
    fetch(window.__resources.video)
      .then(r  => r.blob())
      .then(b  => { url = URL.createObjectURL(b); setBlobUrl(url); })
      .catch(e => console.warn('[videobg]', e));
    return () => { if (url) URL.revokeObjectURL(url); };
  }, []);

  // ── 2. Attach & pause (no autoplay) ──────────────────────────────────────
  useEffect(() => {
    const v = videoRef.current;
    if (!v || !blobUrl) return;
    const isMobile = window.matchMedia('(max-width: 767px)').matches;
    v.muted = true; v.playsInline = true; v.preload = 'auto'; v.loop = isMobile;
    const onMeta = () => {
      if (isMobile) {
        // Mobile browsers don't reliably paint scrubbed (seeked) frames on a
        // paused video, so the car would stay invisible. Play it as a gentle
        // muted loop instead — the cinematic backdrop is visible either way.
        v.play().catch(() => {});
      } else {
        v.pause();
        v.currentTime = 0;
      }
      setReady(true);
    };
    v.addEventListener('loadedmetadata', onMeta, { once: true });
    if (v.readyState >= 1) onMeta();
  }, [blobUrl]);

  // ── 3. Scroll + RAF (all via refs — zero React re-renders) ────────────────
  useEffect(() => {
    if (!ready) return;
    const v = videoRef.current;
    if (!v) return;

    // On mobile the video plays as a loop (see attach effect) — skip the
    // scroll-scrub machinery entirely so we don't fight playback.
    if (window.matchMedia('(max-width: 767px)').matches) return;

    // Scroll handler — only writes to refs, touches no React state
    const onScroll = () => {
      const max = document.documentElement.scrollHeight - window.innerHeight;
      const p   = max > 0 ? Math.min(1, Math.max(0, window.scrollY / max)) : 0;
      const dur = Math.max(0.1, (v.duration || 15) - CUT_END);
      targetRef.current = p * dur;
      pRef.current      = p;

      // Skyline opacity
      if (skyRef.current) {
        const sp = Math.min(1, Math.max(0, (p - 0.72) / 0.20));
        skyRef.current.style.opacity = (sp * 0.44).toFixed(3);
      }
    };

    window.addEventListener('scroll', onScroll, { passive: true });
    onScroll(); // seed on mount

    // RAF loop — seek + DOM side-effects, never touches React state
    let rafId;
    const tick = (now) => {
      // ── Seek ────────────────────────────────────────────────────────────
      const target  = targetRef.current;
      const cur     = v.currentTime;
      const diff    = target - cur;
      const elapsed = now - lastSeekRef.current;

      if (elapsed >= 16) { // ~60fps
        if (Math.abs(diff) > 0.5) {
          v.currentTime = target;            // big jump → direct
        } else if (Math.abs(diff) > 0.01) {
          v.currentTime = cur + diff * 0.80; // small diff → lerp
        }
        lastSeekRef.current = now;
      }

      // ── Stage indicator ────────────────────────────────────────────────
      const p = pRef.current;
      const stage = STAGES.find(s => p >= s.from && p <= s.to) || STAGES[3];
      const el    = stageRef.current;
      if (el) {
        const lbl = el.querySelector('.sl'); if (lbl) lbl.textContent = stage.label;
        const sub = el.querySelector('.ss'); if (sub) sub.textContent = stage.sub;
        const bar = el.querySelector('.sb');
        if (bar) {
          const pct = ((p - stage.from) / Math.max(0.001, stage.to - stage.from) * 100);
          bar.style.height = Math.min(100, pct).toFixed(1) + '%';
        }
      }

      // ── Proximity chips ────────────────────────────────────────────────
      chipsRef.current.forEach((chip, i) => {
        if (!chip) return;
        const c   = CHIPS[i];
        const t   = (p - (c.p - 0.06)) / 0.24; // 0→1 over window
        const a   = t > 0 && t < 1 ? Math.sin(t * Math.PI) * 0.70 : 0;
        const sc  = 0.84 + Math.min(1, Math.max(0, (p - (c.p - 0.06)) / 0.08)) * 0.18;
        chip.style.opacity  = a < 0.01 ? '0' : a.toFixed(3);
        chip.style.transform = `scale(${sc.toFixed(3)})`;
        chip.style.display  = a < 0.005 ? 'none' : 'flex';
      });

      rafId = requestAnimationFrame(tick);
    };
    rafId = requestAnimationFrame(tick);

    return () => {
      cancelAnimationFrame(rafId);
      window.removeEventListener('scroll', onScroll);
    };
  }, [ready]);

  return (
    <div className="fixed inset-0 z-0 pointer-events-none overflow-hidden"
         style={{ background: '#010101' }}>

      {/* Film grain */}
      <canvas id="grain-canvas" className="absolute inset-0 w-full h-full"
              style={{ opacity: 0.018, mixBlendMode: 'screen', zIndex: 3, pointerEvents: 'none' }} />

      {/* Scroll-scrubbed video */}
      <video
        ref={videoRef}
        src={blobUrl || undefined}
        muted playsInline preload="auto"
        className="absolute inset-0 w-full h-full object-cover"
        style={{
          opacity:    ready ? 1 : 0,
          transition: 'opacity 1.6s ease-out',
          transform:  'scale(1.04) translateZ(0)',
          filter:     'contrast(1.08) saturate(0.50) brightness(0.16)',
          willChange: 'opacity',
        }}
      />

      {/* Frankfurt skyline — scroll-driven */}
      <div ref={skyRef} className="absolute inset-x-0 bottom-0"
           style={{ height: '52vh', opacity: 0, zIndex: 4, pointerEvents: 'none' }}>
        <div style={{ position: 'absolute', inset: 0,
                      background: 'radial-gradient(ellipse 90% 55% at 50% 100%, rgba(28,55,168,0.10), transparent 70%)' }} />
        <FrankfurtSkyline className="w-full h-full" opacity={1} />
      </div>

      {/* Comet trails */}
      <LightTrailField />

      {/* Proximity chips */}
      {CHIPS.map((chip, i) => (
        <div
          key={i}
          ref={el => { chipsRef.current[i] = el; }}
          style={{
            position: 'absolute', left: chip.x, top: chip.y,
            transformOrigin: chip.side === 'left' ? 'left center' : 'right center',
            opacity: 0, display: 'none',
            alignItems: 'center', gap: 8, zIndex: 5, pointerEvents: 'none',
          }}
        >
          {chip.side === 'right' && (
            <div style={{ width: 22, height: 1,
              background: 'linear-gradient(90deg, rgba(90,136,240,0.0), rgba(90,136,240,0.55))' }} />
          )}
          <div style={{
            fontFamily: "'JetBrains Mono', monospace",
            fontSize: 10, letterSpacing: '0.20em', textTransform: 'uppercase',
            color: 'rgba(192,205,240,0.75)',
            background: 'rgba(4,8,22,0.55)',
            border: '1px solid rgba(90,136,240,0.22)',
            padding: '5px 11px',
            backdropFilter: 'blur(6px)',
            whiteSpace: 'nowrap',
          }}>
            {chip.text}
          </div>
          {chip.side === 'left' && (
            <div style={{ width: 22, height: 1,
              background: 'linear-gradient(90deg, rgba(90,136,240,0.55), rgba(90,136,240,0.0))' }} />
          )}
        </div>
      ))}

      {/* Stage indicator — right rail */}
      <div ref={stageRef}
           className="hidden md:flex absolute right-7 top-1/2 -translate-y-1/2 flex-col items-end gap-2"
           style={{ zIndex: 6, pointerEvents: 'none' }}>
        <div className="sl" style={{
          fontFamily: "'JetBrains Mono', monospace",
          fontSize: 9, letterSpacing: '0.22em', textTransform: 'uppercase',
          color: 'rgba(152,194,255,0.58)',
        }}>Exterieur</div>
        <div className="ss" style={{
          fontFamily: "'JetBrains Mono', monospace",
          fontSize: 7.5, letterSpacing: '0.18em', textTransform: 'uppercase',
          color: 'rgba(192,200,218,0.26)',
        }}>Außenperspektive</div>
        <div style={{ width: 1.5, height: 56, background: 'rgba(255,255,255,0.07)',
                      borderRadius: 1, marginTop: 5, overflow: 'hidden' }}>
          <div className="sb" style={{
            width: '100%', height: '0%',
            background: 'linear-gradient(180deg, rgba(90,136,240,0.8), rgba(152,194,255,0.35))',
          }} />
        </div>
      </div>

      {/* ── Multi-layer vignette — hides video edges, centres attention ── */}
      {/* L1: radial spotlight */}
      <div className="absolute inset-0" style={{
        background: 'radial-gradient(ellipse 46% 54% at 50% 40%, transparent 0%, transparent 20%, rgba(0,0,0,0.52) 50%, rgba(0,0,0,0.97) 84%)',
        zIndex: 7, pointerEvents: 'none',
        animation: 'mdw-vbreathe 9s ease-in-out infinite',
      }} />
      {/* L2: top & bottom bars */}
      <div className="absolute inset-0" style={{
        background: 'linear-gradient(to bottom, rgba(0,0,0,0.80) 0%, transparent 18%, transparent 76%, rgba(0,0,0,0.86) 100%)',
        zIndex: 8, pointerEvents: 'none',
      }} />
      {/* L3: left & right bars */}
      <div className="absolute inset-0" style={{
        background: 'linear-gradient(to right, rgba(0,0,0,0.82) 0%, transparent 20%, transparent 80%, rgba(0,0,0,0.82) 100%)',
        zIndex: 8, pointerEvents: 'none',
      }} />
      <style>{`@keyframes mdw-vbreathe { 0%,100%{opacity:.80} 50%{opacity:1.0} }`}</style>

      {/* Loading screen */}
      <div className="absolute inset-0 flex flex-col items-center justify-center"
           style={{ background:'#010101', zIndex:20,
                    opacity: ready ? 0 : 1, transition:'opacity 1.8s ease-out', pointerEvents:'none' }}>
        <div style={{ fontFamily:"'Cinzel',serif", fontSize:8, letterSpacing:'0.44em',
                      textTransform:'uppercase', color:'rgba(192,197,203,0.28)', marginBottom:22 }}>
          MAIN DETAILWERK
        </div>
        <div style={{ width:64, height:1, background:'rgba(255,255,255,0.05)', overflow:'hidden' }}>
          <div style={{ height:'100%', background:'linear-gradient(90deg,#3a3e46,#9ea4b0)',
                        animation:'mdw-bar 2.2s ease-in-out infinite' }} />
        </div>
        <style>{`@keyframes mdw-bar{0%{width:0%;margin-left:0%}50%{width:100%;margin-left:0%}100%{width:0%;margin-left:100%}}`}</style>
      </div>
    </div>
  );
}

// ── Film grain ──────────────────────────────────────────────────────────────
(function initGrain() {
  function frame() {
    const canvas = document.getElementById('grain-canvas');
    if (!canvas) { requestAnimationFrame(frame); return; }
    const ctx = canvas.getContext('2d');
    if (canvas.width  !== window.innerWidth)  canvas.width  = window.innerWidth;
    if (canvas.height !== window.innerHeight) canvas.height = window.innerHeight;
    const img = ctx.createImageData(canvas.width, canvas.height);
    const d = img.data;
    for (let i = 0; i < d.length; i += 4) {
      const n = (Math.random() * 255) | 0;
      d[i] = d[i+1] = d[i+2] = n; d[i+3] = 255;
    }
    ctx.putImageData(img, 0, 0);
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
}());

window.GlobalVideoBackdrop = GlobalVideoBackdrop;

</script>

<script type="text/babel">
/* global React, useState, useRef, useEffect, Section, Reveal, ImgPlaceholder */

// ── Shared slider logic ──────────────────────────────────────────────────────
function useSlider() {
  const [pos, setPos] = useState(50);
  const ref = useRef(null);
  const dragging = useRef(false);
  const onMove = (clientX) => {
    const el = ref.current; if (!el) return;
    const r = el.getBoundingClientRect();
    setPos(Math.max(0, Math.min(100, (clientX - r.left) / r.width * 100)));
  };
  useEffect(() => {
    const up   = () => { dragging.current = false; };
    const move = (e) => { if (dragging.current) onMove(e.clientX); };
    const tm   = (e) => { if (dragging.current && e.touches[0]) onMove(e.touches[0].clientX); };
    window.addEventListener('mousemove', move);
    window.addEventListener('touchmove', tm, { passive: false });
    window.addEventListener('mouseup', up);
    window.addEventListener('touchend', up);
    return () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('touchmove', tm);
      window.removeEventListener('mouseup', up);
      window.removeEventListener('touchend', up);
    };
  }, []);
  return { pos, ref, dragging, onMove };
}

// ── Divider handle ───────────────────────────────────────────────────────────
function Divider({ pos }) {
  return (
    <div className="absolute top-0 bottom-0 pointer-events-none"

          <path d="M8 6l-4 6 4 6M16 6l4 6-4 6"/>
        </svg>
      </div>
    </div>
  );
}

<script type="text/babel">
/* global React, ReactDOM, useState, useEffect, useTweaks, TweaksPanel, TweakSection, TweakColor, TweakRadio, TweakToggle, TweakSelect, TweakSlider, Hero, Trust, Materials, BeforeAfter, SummerPass, Packages, Configurator, Process, Why, Region, FAQ, CTA, Footer, MobileService, GlobalVideoBackdrop */

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accent": "#3a6ee8",
  "uiChrome": "silver",
  "headline": "Kein Kompromiss. Nicht einmal beim Detail.",
  "serifFont": "Cinzel",
  "brightness": 68,
  "logoSize": 80,
  "logoSizeFooter": 130
}/*EDITMODE-END*/;

const HEADLINES = {
  'Sauber. Klar. Bereit.': 'Sauber. Klar. Bereit.',
  'Kein Kompromiss. Nicht einmal beim Detail.': 'Kein Kompromiss. Nicht einmal beim Detail.',
  'Der Innenraum. Wie er sein sollte.': 'Der Innenraum. Wie er sein sollte.',
  'Materialgerechte Pflege. Ab 49 €.': 'Materialgerechte Pflege. Ab 49 €.',
};

const SUBS = {
  'Sauber. Klar. Bereit.': 'Professionelle Innenraumreinigung für Frankfurt, Offenbach und Umgebung. Leder, Glas, Klavierlack, Stoff – materialgerecht behandelt ab 49 €.',
  'Kein Kompromiss. Nicht einmal beim Detail.': 'Innenraumreinigung, die man sieht und spürt. Jede Oberfläche behandelt, wie sie es verdient. Buchung per WhatsApp.',
  'Der Innenraum. Wie er sein sollte.': 'Materialgerechte Detailpflege für Frankfurt und Umgebung. Transparent. Zuverlässig. Ab 49 €.',
  'Materialgerechte Pflege. Ab 49 €.': 'Leder, Glas, Klavierlack, Stoff – wir reinigen jede Oberfläche mit dem richtigen Mittel. Termin per WhatsApp in Sekunden.',
};

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);

  // Logo size CSS variables
  useEffect(() => {
    document.documentElement.style.setProperty('--logo-size', `${t.logoSize}px`);
    document.documentElement.style.setProperty('--logo-size-footer', `${t.logoSizeFooter}px`);
  }, [t.logoSize, t.logoSizeFooter]);

  // UI chrome scheme (silver vs gold)
  useEffect(() => {
    const root = document.documentElement;
    const schemes = {
      silver: { ui: '#c0c5cb', uiRgb: '192,197,203' },
      gold:   { ui: '#c9a96a', uiRgb: '201,169,106' },
      navy:   { ui: '#7da8c4', uiRgb: '125,168,196' },
    };
    const s = schemes[t.uiChrome] || schemes.silver;
    root.style.setProperty('--ui', s.ui);
    root.style.setProperty('--ui-rgb', s.uiRgb);
  }, [t.uiChrome]);

  // Video brightness
  useEffect(() => {
    let st = document.getElementById('__tweak-vid');
    if (!st) { st = document.createElement('style'); st.id = '__tweak-vid'; document.head.appendChild(st); }
    st.textContent = `#grain-canvas ~ video, .fixed video { filter: contrast(1.1) saturate(1.05) brightness(${t.brightness / 100}) sepia(0.06) !important; }`;
  }, [t.brightness]);

  // Apply CTA accent
  useEffect(() => {
    const root = document.documentElement;
    root.style.setProperty('--champagne', t.accent);
  }, [t.accent]);
  useEffect(() => {
    document.documentElement.style.setProperty('--serif', t.serifFont);
    let st = document.getElementById('__tweak-font');
    if (!st) { st = document.createElement('style'); st.id = '__tweak-font'; document.head.appendChild(st); }
    st.textContent = `.font-serif, .display, .text-leather, .text-glass, .text-piano, .text-chrome, .text-fabric, .text-finish, .metal-price { font-family: '${t.serifFont}', serif !important; }`;
  }, [t.serifFont]);

  const headline = HEADLINES[t.headline] || t.headline;
  const sub = SUBS[t.headline] || SUBS['Premium Innenraumreinigung ab 49 €'];

  return (
    <div id="top" className="mesh-bg relative">
      <GlobalVideoBackdrop />
      <div className="relative z-10">
      <Hero headline={headline} sub={sub} />
      <MobileService />
      <Materials />
      {/* <BeforeAfter /> — Vorher/Nachher: aktivieren sobald Fotos fertig */}
      <SummerPass />
      <Packages />
      <Configurator />
      <Trust />
      <Why />
      <Region />
      <FAQ />
      <CTA />
      <Footer />
      </div>

      <TweaksPanel>
        <TweakSection label="Logo" />
        <TweakSlider
          label="Größe Navigation"
          value={t.logoSize}
          min={48} max={140} step={4}
          onChange={(v) => setTweak('logoSize', v)}
        />
        <TweakSlider
          label="Größe Footer"
          value={t.logoSizeFooter}
          min={80} max={240} step={8}
          onChange={(v) => setTweak('logoSizeFooter', v)}
        />
        <TweakSection label="CTA-Akzentfarbe" />
        <TweakColor
          label="Kaufbuttons &amp; Preise"
          value={t.accent}
          options={['#c0c5cb', '#d0d4d8', '#c9a96a', '#e8d4a0', '#7da8c4']}
          onChange={(v) => setTweak('accent', v)}
        />
        <TweakSection label="UI-Chrom" />
        <TweakSelect
          label="Akzentton Navigation &amp; Labels"
          value={t.uiChrome}
          options={['silver', 'gold', 'navy']}
          onChange={(v) => setTweak('uiChrome', v)}
        />
        <TweakSection label="Video" />
        <TweakSlider
          label="Hintergrund-Helligkeit"
          value={t.brightness}
          min={30} max={90} step={5}
          onChange={(v) => setTweak('brightness', v)}
        />
        <TweakSection label="Headline" />
        <TweakSelect
          label="Hero-Headline"
          value={t.headline}
          options={Object.keys(HEADLINES)}
          onChange={(v) => setTweak('headline', v)}
        />
        <TweakSection label="Typografie" />
        <TweakSelect
          label="Display-Schrift"
          value={t.serifFont}
          options={['Cinzel', 'Fraunces', 'Cormorant Garamond', 'Playfair Display']}
          onChange={(v) => {
            if (!document.getElementById(`__font-${v}`)) {
              const l = document.createElement('link');
              l.id = `__font-${v}`;
              l.rel = 'stylesheet';
              l.href = `https://fonts.googleapis.com/css2?family=${encodeURIComponent(v)}:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap`;
              document.head.appendChild(l);
            }
            setTweak('serifFont', v);
          }}
        />
      </TweaksPanel>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);

</script>
